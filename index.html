<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rate my Aayush</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink-bg-1: #ffd6e8;
    --pink-bg-2: #ffe9f2;
    --pink-card: #fff5fa;
    --pink-primary: #ff6fa5;
    --pink-primary-dark: #e8508c;
    --pink-deep: #d6336c;
    --pink-pale: #ffc2dd;
    --pink-line: #ffb8d9;
    --text-plum: #6b2545;
    --text-soft: #9c5776;
    --shadow: 0 8px 24px rgba(214, 51, 108, 0.15);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Quicksand', sans-serif;
    background: linear-gradient(180deg, var(--pink-bg-1) 0%, var(--pink-bg-2) 45%, #fff 100%);
    color: var(--text-plum);
    min-height: 100vh;
    padding: 24px 16px 80px;
    overflow-x: hidden;
    position: relative;
  }

  .cloud {
    position: fixed;
    background: #fff;
    opacity: 0.6;
    border-radius: 50%;
    filter: blur(1px);
    z-index: 0;
  }

  .wrap { max-width: 620px; margin: 0 auto; position: relative; z-index: 1; }

  header { text-align: center; margin-bottom: 8px; }

  h1 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(2rem, 7vw, 2.8rem);
    color: var(--pink-deep);
    margin: 4px 0 0;
    letter-spacing: -0.5px;
  }

  .subtitle { font-size: 1.05rem; color: var(--text-soft); margin-top: 4px; font-weight: 600; }

  .mascot-wrap { display: flex; justify-content: center; margin-bottom: 4px; }
  #mascot-photo {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    object-fit: cover;
    border: 5px solid #fff;
    box-shadow: 0 8px 22px rgba(214,51,108,0.3);
    transition: transform 0.3s ease;
  }
  .mascot-wrap:hover #mascot-photo { transform: scale(1.04) rotate(-2deg); }

  .card {
    background: var(--pink-card);
    border: 2px solid var(--pink-line);
    border-radius: 28px;
    padding: 26px 24px;
    margin-top: 22px;
    box-shadow: var(--shadow);
  }

  .question { margin-bottom: 22px; }

  .question label {
    display: block;
    font-weight: 700;
    font-size: 1.02rem;
    margin-bottom: 8px;
    color: var(--pink-deep);
  }

  .qnum {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--pink-primary);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    margin-right: 8px;
    font-family: 'Fredoka', sans-serif;
  }

  textarea {
    width: 100%;
    min-height: 70px;
    border: 1.5px solid var(--pink-pale);
    border-radius: 16px;
    padding: 12px 14px;
    font-family: 'Quicksand', sans-serif;
    font-size: 0.98rem;
    color: var(--text-plum);
    resize: vertical;
    background: #fff;
    transition: border-color 0.2s;
  }

  textarea:focus { outline: none; border-color: var(--pink-primary); }

  .heart-meter { display: flex; align-items: center; gap: 14px; }
  .heart-visual { width: 54px; height: 48px; position: relative; flex-shrink: 0; }
  .heart-visual svg { width: 100%; height: 100%; }

  #love-label {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    color: var(--pink-deep);
    font-size: 0.95rem;
    min-width: 90px;
  }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 8px;
    border-radius: 6px;
    background: var(--pink-pale);
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--pink-primary);
    border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(214,51,108,0.4);
    cursor: pointer;
  }

  input[type=range]::-moz-range-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--pink-primary);
    border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(214,51,108,0.4);
    cursor: pointer;
  }

  .week-rating-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }

  #week-num {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 1.4rem;
    color: var(--pink-deep);
    min-width: 46px;
    text-align: center;
    background: #fff;
    border-radius: 12px;
    padding: 4px 0;
    border: 1.5px solid var(--pink-pale);
  }

  .photo-section-title {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    color: var(--pink-deep);
    font-size: 1.02rem;
    margin: 4px 0 12px;
  }

  .photo-row { display: flex; gap: 12px; flex-wrap: wrap; }

  .photo-box {
    width: 100px;
    height: 100px;
    border-radius: 18px;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 4px 10px rgba(214,51,108,0.18);
    position: relative;
    background: #fff;
    border: 2px dashed var(--pink-pale);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .photo-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-box .photo-plus { font-size: 1.8rem; color: var(--pink-primary); font-weight: 300; }
  .photo-box input { display: none; }
  .photo-box .uploading-label {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: var(--pink-deep);
    font-weight: 700;
    text-align: center;
  }
  .photo-box.uploading .uploading-label { display: flex; }

  .submit-btn {
    display: block;
    width: 100%;
    margin-top: 26px;
    padding: 15px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--pink-primary), var(--pink-primary-dark));
    color: #fff;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(214,51,108,0.35);
    transition: transform 0.15s;
  }

  .submit-btn:hover { transform: translateY(-2px); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.6; cursor: default; transform: none; }

  .history-toggle {
    text-align: center;
    margin-top: 26px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    color: var(--pink-deep);
    cursor: pointer;
    font-size: 0.95rem;
    user-select: none;
  }

  .history-list { display: none; margin-top: 14px; }
  .history-list.open { display: block; }

  .history-entry {
    background: #fff;
    border: 1.5px solid var(--pink-pale);
    border-radius: 18px;
    padding: 14px 18px;
    margin-bottom: 12px;
    cursor: pointer;
  }

  .history-entry .h-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 700;
    color: var(--pink-deep);
  }

  .history-entry .h-detail {
    display: none;
    margin-top: 10px;
    font-size: 0.9rem;
    color: var(--text-plum);
    line-height: 1.5;
  }

  .history-entry.open .h-detail { display: block; }
  .history-entry .h-detail b { color: var(--pink-deep); }

  .empty-history { text-align: center; color: var(--text-soft); font-size: 0.9rem; margin-top: 10px; }

  .logout-link {
    display: block;
    text-align: center;
    margin: 30px auto 0;
    background: none;
    border: none;
    color: var(--text-soft);
    font-size: 0.78rem;
    text-decoration: underline;
    cursor: pointer;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(255, 214, 232, 0.97);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    z-index: 10;
    padding: 24px;
  }

  .overlay.show { display: flex; }

  .overlay h2 { font-family: 'Fredoka', sans-serif; color: var(--pink-deep); font-size: 1.8rem; margin-top: 20px; }
  .overlay p { color: var(--text-soft); font-size: 1rem; max-width: 320px; }

  .overlay button {
    margin-top: 18px;
    padding: 12px 26px;
    border: none;
    border-radius: 18px;
    background: var(--pink-primary);
    color: #fff;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
  }

  /* Login screen */
  #login-screen {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, var(--pink-bg-1) 0%, var(--pink-bg-2) 45%, #fff 100%);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 24px;
  }

  #login-screen.hidden { display: none; }

  #login-screen h2 { font-family: 'Fredoka', sans-serif; color: var(--pink-deep); font-size: 1.6rem; margin: 18px 0 6px; }
  #login-screen p { color: var(--text-soft); font-size: 0.95rem; margin-bottom: 18px; }

  #login-form { display: flex; flex-direction: column; gap: 10px; width: 240px; }

  #login-form input {
    border: 2px solid var(--pink-pale);
    border-radius: 16px;
    padding: 12px 16px;
    font-family: 'Quicksand', sans-serif;
    font-size: 1rem;
    color: var(--text-plum);
    background: #fff;
  }

  #login-form input:focus { outline: none; border-color: var(--pink-primary); }

  #login-submit {
    margin-top: 6px;
    padding: 12px 28px;
    border: none;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--pink-primary), var(--pink-primary-dark));
    color: #fff;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
  }

  #login-error { color: var(--pink-deep); font-size: 0.85rem; margin-top: 10px; min-height: 16px; }

  #main-content { display: none; }
  #main-content.unlocked { display: block; }
</style>
</head>
<body>

<div id="login-screen">
  <img src="mascot.png" alt="us" style="width:110px; height:110px; border-radius:50%; object-fit:cover; border:4px solid #fff; box-shadow: 0 6px 16px rgba(214,51,108,0.3);">
  <h2>Rate my Aayush 🩷</h2>
  <p>Log in to continue</p>
  <form id="login-form">
    <input type="email" id="login-email" placeholder="Email" autocomplete="username" required>
    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required>
    <button type="submit" id="login-submit">Log in</button>
  </form>
  <div id="login-error"></div>
</div>

<div id="main-content">
<div class="wrap">
  <div class="mascot-wrap">
    <img id="mascot-photo" src="mascot.png" alt="us">
  </div>

  <header>
    <h1>Rate my Aayush 🩷</h1>
    <div class="subtitle">your weekly check-in</div>
  </header>

  <div class="card">
    <div class="question">
      <label><span class="qnum">1</span>What's one moment this week you wish I could've been there for?</label>
      <textarea id="q1" placeholder="Tell me about it..."></textarea>
    </div>

    <div class="question">
      <label><span class="qnum">2</span>Is there anything you want to talk to me about?</label>
      <textarea id="q2" placeholder="I'm listening..."></textarea>
    </div>

    <div class="question">
      <label><span class="qnum">3</span>How are you feeling emotionally? Is there anything on your mind?</label>
      <textarea id="q3" placeholder="Be honest with me..."></textarea>
    </div>

    <div class="question">
      <label><span class="qnum">4</span>What's a moment that made you happy this week?</label>
      <textarea id="q4" placeholder="A good moment..."></textarea>
    </div>

    <div class="question">
      <label><span class="qnum">5</span>How much do you love me?! 🥹</label>
      <div class="heart-meter">
        <div class="heart-visual">
          <svg viewBox="0 0 100 90">
            <defs>
              <clipPath id="heartClip">
                <path d="M50 85 C10 55 0 30 15 15 C28 2 45 8 50 25 C55 8 72 2 85 15 C100 30 90 55 50 85 Z"/>
              </clipPath>
            </defs>
            <path d="M50 85 C10 55 0 30 15 15 C28 2 45 8 50 25 C55 8 72 2 85 15 C100 30 90 55 50 85 Z" fill="#ffd6e8"/>
            <rect id="heart-fill-rect" x="0" y="90" width="100" height="90" fill="#ff3d77" clip-path="url(#heartClip)"/>
          </svg>
        </div>
        <input type="range" id="love" min="0" max="100" value="80">
        <div id="love-label">so much 🩷</div>
      </div>
    </div>

    <div class="question">
      <label><span class="qnum">6</span>Rate your week (1–10) & how do you hope to improve next week?</label>
      <div class="week-rating-row">
        <input type="range" id="week-rating" min="1" max="10" value="7">
        <div id="week-num">7</div>
      </div>
      <textarea id="improve" placeholder="Next week I want to..."></textarea>
    </div>

    <div class="photo-section-title">📸 moments from this week (tap a box to add/change a photo)</div>
    <div class="photo-row" id="photo-row">
      <div class="photo-box" data-slot="photo1"><span class="photo-plus">+</span><input type="file" accept="image/*"><div class="uploading-label">saving...</div></div>
      <div class="photo-box" data-slot="photo2"><span class="photo-plus">+</span><input type="file" accept="image/*"><div class="uploading-label">saving...</div></div>
      <div class="photo-box" data-slot="photo3"><span class="photo-plus">+</span><input type="file" accept="image/*"><div class="uploading-label">saving...</div></div>
    </div>

    <button class="submit-btn" id="submit-btn">Send to Aayush 💌</button>
  </div>

  <div class="history-toggle" id="history-toggle">🩷 Past check-ins</div>
  <div class="history-list" id="history-list"></div>
  <button class="logout-link" id="logout-link">log out</button>
</div>
</div><!-- /#main-content -->

<div class="overlay" id="overlay">
  <img src="mascot.png" alt="us" style="width:120px; height:120px; border-radius:50%; object-fit:cover; border:4px solid #fff; box-shadow: 0 6px 16px rgba(214,51,108,0.3);">
  <h2>Sent with love 🩷</h2>
  <p>Your check-in is saved and on its way to Aayush. He can't wait to read it 🩷</p>
  <button id="overlay-close">Close</button>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>
  // ============ FIREBASE CONFIG ============
  const firebaseConfig = {
    apiKey: "AIzaSyDqMixXiRPeb5uslxoLl7TSMnZxVik8QTE",
    authDomain: "rate-my-aayush.firebaseapp.com",
    projectId: "rate-my-aayush",
    storageBucket: "rate-my-aayush.firebasestorage.app",
    messagingSenderId: "497594194520",
    appId: "1:497594194520:web:a9a7936ec2492a252dc82d"
  };
  // ===========================================================

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();

  const AAYUSH_EMAIL = 'aayushnepal2021@gmail.com';

  // ---------- floating clouds ----------
  for (let i = 0; i < 5; i++) {
    const c = document.createElement('div');
    c.className = 'cloud';
    const size = 60 + Math.random() * 100;
    c.style.width = size + 'px';
    c.style.height = size * 0.6 + 'px';
    c.style.left = Math.random() * 90 + 'vw';
    c.style.top = Math.random() * 80 + 'vh';
    document.body.appendChild(c);
  }

  // ---------- login ----------
  const loginScreen = document.getElementById('login-screen');
  const mainContent = document.getElementById('main-content');
  const loginForm = document.getElementById('login-form');
  const loginError = document.getElementById('login-error');

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    loginError.textContent = '';
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    auth.signInWithEmailAndPassword(email, password).catch((err) => {
      console.error('Firebase auth error:', err.code, err.message);
      let msg = err.message;
      if (err.code === 'auth/unauthorized-domain') {
        msg = 'This website\'s domain isn\'t authorized in Firebase yet (Authentication → Settings → Authorized domains).';
      } else if (err.code === 'auth/invalid-api-key' || err.code === 'auth/api-key-not-valid') {
        msg = 'The Firebase config in this page looks incomplete — check the firebaseConfig values.';
      } else if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
        msg = 'No account found with that email — check it was added in Firebase Authentication → Users.';
      } else if (err.code === 'auth/wrong-password') {
        msg = 'That password isn\'t right — try again.';
      } else if (err.code === 'auth/operation-not-allowed') {
        msg = 'Email/Password sign-in isn\'t enabled in Firebase yet.';
      }
      loginError.textContent = msg + ' (' + err.code + ')';
    });
  });

  document.getElementById('logout-link').addEventListener('click', () => {
    auth.signOut();
  });

  auth.onAuthStateChanged((user) => {
    if (user) {
      loginScreen.classList.add('hidden');
      mainContent.classList.add('unlocked');
      loadPhotos();
      renderHistory();
    } else {
      loginScreen.classList.remove('hidden');
      mainContent.classList.remove('unlocked');
    }
  });

  // ---------- love heart meter ----------
  const loveSlider = document.getElementById('love');
  const heartFillRect = document.getElementById('heart-fill-rect');
  const loveLabel = document.getElementById('love-label');
  function updateHeart() {
    const v = parseInt(loveSlider.value, 10);
    const y = 90 - (v / 100) * 90;
    heartFillRect.setAttribute('y', y);
    let label = 'a little 🩷';
    if (v >= 95) label = 'infinity 🩷';
    else if (v >= 75) label = 'so much 🩷';
    else if (v >= 45) label = 'a lot 🩷';
    else if (v >= 20) label = 'kinda 🩷';
    loveLabel.textContent = label;
  }
  loveSlider.addEventListener('input', updateHeart);
  updateHeart();

  // ---------- week rating number display ----------
  const weekSlider = document.getElementById('week-rating');
  const weekNum = document.getElementById('week-num');
  function updateWeekNum() {
    weekNum.textContent = weekSlider.value;
  }
  weekSlider.addEventListener('input', updateWeekNum);
  updateWeekNum();

  // ---------- photos (Firebase Storage) ----------
  function loadPhotos() {
    document.querySelectorAll('.photo-box').forEach((box) => {
      const slot = box.dataset.slot;
      const ref = storage.ref().child(`photos/${slot}.jpg`);
      ref.getDownloadURL().then((url) => {
        let img = box.querySelector('img');
        if (!img) {
          img = document.createElement('img');
          box.insertBefore(img, box.firstChild);
        }
        img.src = url;
        box.querySelector('.photo-plus').style.display = 'none';
      }).catch(() => {
        // no photo uploaded yet for this slot — leave the + showing
      });
    });
  }

  function compressImage(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const maxDim = 700;
          let w = img.width, h = img.height;
          if (w > h && w > maxDim) { h = h * (maxDim / w); w = maxDim; }
          else if (h > maxDim) { w = w * (maxDim / h); h = maxDim; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.8);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  document.querySelectorAll('.photo-box').forEach((box) => {
    const slot = box.dataset.slot;
    const input = box.querySelector('input');

    box.addEventListener('click', () => input.click());

    input.addEventListener('change', async () => {
      if (!input.files[0]) return;
      box.classList.add('uploading');
      try {
        const blob = await compressImage(input.files[0]);
        const ref = storage.ref().child(`photos/${slot}.jpg`);
        await ref.put(blob, { contentType: 'image/jpeg' });
        const url = await ref.getDownloadURL();
        let img = box.querySelector('img');
        if (!img) {
          img = document.createElement('img');
          box.insertBefore(img, box.firstChild);
        }
        img.src = url;
        box.querySelector('.photo-plus').style.display = 'none';
      } catch (err) {
        alert('Could not upload that photo. Try again?');
      }
      box.classList.remove('uploading');
      input.value = '';
    });
  });

  // ---------- history (Firestore) ----------
  function escapeHtml(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function renderHistory() {
    const container = document.getElementById('history-list');
    container.innerHTML = '<div class="empty-history">Loading...</div>';
    db.collection('checkins').orderBy('createdAt', 'desc').limit(50).get()
      .then((snapshot) => {
        container.innerHTML = '';
        if (snapshot.empty) {
          container.innerHTML = '<div class="empty-history">No check-ins saved yet.</div>';
          return;
        }
        snapshot.forEach((doc) => {
          const entry = doc.data();
          const date = entry.createdAt && entry.createdAt.toDate
            ? entry.createdAt.toDate().toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })
            : '';
          const div = document.createElement('div');
          div.className = 'history-entry';
          div.innerHTML = `
            <div class="h-top"><span>${date}</span><span>${entry.weekRating}/10 · loved ${entry.love}%</span></div>
            <div class="h-detail">
              <b>Wish you were there:</b> ${escapeHtml(entry.q1) || '—'}<br><br>
              <b>Wanted to talk about:</b> ${escapeHtml(entry.q2) || '—'}<br><br>
              <b>Feeling:</b> ${escapeHtml(entry.q3) || '—'}<br><br>
              <b>Happy moment:</b> ${escapeHtml(entry.q4) || '—'}<br><br>
              <b>Improve next week:</b> ${escapeHtml(entry.improve) || '—'}
            </div>
          `;
          div.addEventListener('click', () => div.classList.toggle('open'));
          container.appendChild(div);
        });
      })
      .catch((err) => {
        container.innerHTML = '<div class="empty-history">Could not load past check-ins.</div>';
      });
  }

  document.getElementById('history-toggle').addEventListener('click', () => {
    const list = document.getElementById('history-list');
    list.classList.toggle('open');
    if (list.classList.contains('open')) renderHistory();
  });

  // ---------- submit ----------
  document.getElementById('submit-btn').addEventListener('click', async () => {
    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';

    const q1 = document.getElementById('q1').value.trim();
    const q2 = document.getElementById('q2').value.trim();
    const q3 = document.getElementById('q3').value.trim();
    const q4 = document.getElementById('q4').value.trim();
    const love = loveSlider.value;
    const weekRating = weekSlider.value;
    const improve = document.getElementById('improve').value.trim();
    const submittedBy = auth.currentUser ? auth.currentUser.email : 'unknown';

    try {
      await db.collection('checkins').add({
        q1, q2, q3, q4, love, weekRating, improve,
        submittedBy,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch (err) {
      alert('Could not save this check-in. Check your connection and try again.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send to Aayush 💌';
      return;
    }

    const bodyLines = [
      `Rate my Aayush — new check-in`,
      '',
      `1) One moment you wish I could've been there for:`,
      q1 || '(no answer)',
      '',
      `2) Something to talk about:`,
      q2 || '(no answer)',
      '',
      `3) How you're feeling emotionally:`,
      q3 || '(no answer)',
      '',
      `4) A happy moment this week:`,
      q4 || '(no answer)',
      '',
      `5) How much do you love me: ${love}%`,
      '',
      `6) Week rating: ${weekRating}/10`,
      `Improve next week: ${improve || '(no answer)'}`,
      '',
      `(full check-in with photos is saved on the site)`
    ];
    const bodyText = bodyLines.join('\n');
    const subject = `Weekly check-in`;
    const mailto = `mailto:${AAYUSH_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyText)}`;

    document.getElementById('overlay').classList.add('show');
    renderHistory();

    submitBtn.disabled = false;
    submitBtn.textContent = 'Send to Aayush 💌';

    if (submittedBy !== AAYUSH_EMAIL) {
      window.location.href = mailto;
    }
  });

  document.getElementById('overlay-close').addEventListener('click', () => {
    document.getElementById('overlay').classList.remove('show');
  });
</script>

</body>
</html>
